<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFD4C8">
  <meta name="color-scheme" content="light only">
  <title>Spektrum B1 – Wendungen</title>
  <style>
    html{color-scheme:light only;}
    :root {
      --bg: #FFF0EB;
      --card: #FFFAF7;
      --card2: #FFE8E0;
      --text: #5C3D35;
      --muted: #9A7268;
      --accent: #E8957A;
      --accent2: #D4847A;
      --ok: #6BAF7A;
      --border: rgba(200, 140, 120, .22);
      --shadow: 0 10px 32px rgba(200, 140, 120, .18);
      --radius: 18px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(900px 500px at 50% -5%, #FFE0D4 0%, var(--bg) 60%);
      color: var(--text);
      line-height: 1.5;
      overscroll-behavior: none;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      padding: 12px 14px calc(16px + var(--safe-bottom));
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -.02em;
    }

    .brand p {
      margin: 2px 0 0;
      font-size: .78rem;
      color: var(--muted);
    }

    .stats {
      text-align: right;
      font-size: .78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .stats strong { color: var(--accent); display: block; font-size: .95rem; }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    select {
      width: 100%;
      background: var(--card2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: .9rem;
      appearance: none;
    }

    .progress-wrap {
      height: 6px;
      background: rgba(200, 140, 120, .15);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .25s ease;
    }

    .card {
      background: linear-gradient(180deg, var(--card) 0%, #FFF5F0 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 380px;
      touch-action: pan-y;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .pill {
      font-size: .72rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(232, 149, 122, .18);
      color: #B85A42;
      border: 1px solid rgba(232, 149, 122, .3);
    }

    .pill.topic {
      background: rgba(212, 132, 122, .15);
      color: #A65E52;
      border-color: rgba(212, 132, 122, .28);
    }

    .pill.learned {
      background: rgba(107, 175, 122, .18);
      color: #4A8A58;
      border-color: rgba(107, 175, 122, .35);
    }

    .progress-topic.clickable {
      cursor: pointer;
    }

    .progress-topic.clickable:active {
      opacity: .7;
    }

    .wendung {
      font-size: clamp(1.2rem, 4.8vw, 1.55rem);
      font-weight: 700;
      line-height: 1.35;
      margin: 8px 0 6px;
      letter-spacing: -.02em;
      color: #4A2E28;
    }

    .turkce {
      font-size: 1.05rem;
      color: var(--accent2);
      font-weight: 600;
      margin: 0 0 16px;
      line-height: 1.4;
    }

    .hint {
      color: var(--muted);
      font-size: .88rem;
      margin-bottom: 16px;
    }

    .sentences {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: auto;
    }

    .turkce.hidden { display: none; }
    .turkce { animation: fadein .25s ease; }
    @keyframes fadein { from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }

    .sentence {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: .95rem;
    }

    .sentence-num {
      display: inline-block;
      font-size: .7rem;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 12px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .12s ease, opacity .12s ease;
    }

    button:active { transform: scale(.98); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      grid-column: span 2;
    }

    .btn-secondary {
      background: #FFF5F0;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ok {
      background: rgba(107, 175, 122, .15);
      color: #4A8A58;
      border: 1px solid rgba(107, 175, 122, .35);
    }

    .nav {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .nav button { padding: 12px 8px; font-size: .85rem; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 10px;
    }

    .mode-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .mode-toggle button {
      flex: 1;
      padding: 8px;
      font-size: .8rem;
      background: #FFF5F0;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .mode-toggle button.active {
      background: rgba(232, 149, 122, .22);
      color: #8E4538;
      border-color: rgba(232, 149, 122, .4);
    }

    .learn-view.hidden,
    .progress-view.hidden { display: none; }

    .progress-view {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 380px;
    }

    .progress-summary {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      font-size: .9rem;
    }

    .progress-summary strong { color: var(--accent); }

    .progress-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 4px;
    }

    .progress-chapter {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
    }

    .progress-chapter-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: .92rem;
    }

    .progress-chapter-head .badge {
      font-size: .72rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(107, 175, 122, .15);
      color: #4A8A58;
      white-space: nowrap;
    }

    .progress-chapter-head .badge.partial {
      background: rgba(232, 149, 122, .15);
      color: #B85A42;
    }

    .progress-chapter-head .badge.empty {
      background: rgba(154, 114, 104, .12);
      color: var(--muted);
    }

    .progress-topic {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-top: 1px solid var(--border);
      font-size: .82rem;
    }

    .progress-topic:first-of-type { border-top: none; padding-top: 0; }

    .progress-topic.done { color: #4A8A58; }
    .progress-topic.partial { color: var(--text); }
    .progress-topic.none { color: var(--muted); }

    .progress-topic span:last-child {
      font-size: .75rem;
      white-space: nowrap;
      color: var(--muted);
    }

    .topic-mini-bar {
      height: 4px;
      background: rgba(200, 140, 120, .15);
      border-radius: 999px;
      margin-top: 4px;
      overflow: hidden;
    }

    .topic-mini-bar div {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--ok));
      border-radius: 999px;
    }

    @media (max-height: 700px) {
      .card { min-height: 320px; padding: 16px 14px; }
      .wendung { font-size: 1.15rem; }
    }
  </style>
</head>

    const els = {
      counter: document.getElementById('counter'),
      learnedCount: document.getElementById('learnedCount'),
      chapterFilter: document.getElementById('chapterFilter'),
      topicFilter: document.getElementById('topicFilter'),
      progressBar: document.getElementById('progressBar'),
      chapterPill: document.getElementById('chapterPill'),
      topicPill: document.getElementById('topicPill'),
      wendungText: document.getElementById('wendungText'),
      turkceText: document.getElementById('turkceText'),
      hintText: document.getElementById('hintText'),
      revealBtn: document.getElementById('revealBtn'),
      knownBtn: document.getElementById('knownBtn'),
      againBtn: document.getElementById('againBtn'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      shuffleBtn: document.getElementById('shuffleBtn'),
      card: document.getElementById('card'),
      modeLearn: document.getElementById('modeLearn'),
      modeRandom: document.getElementById('modeRandom'),
      modeReview: document.getElementById('modeReview'),
      modeProgress: document.getElementById('modeProgress'),
      learnView: document.getElementById('learnView'),
      progressView: document.getElementById('progressView'),
      progressSummary: document.getElementById('progressSummary'),
      progressList: document.getElementById('progressList'),
    };

    function loadProgress() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"known":[],"index":0}');
      } catch {
        return { known: [], index: 0 };
      }
    }

    function saveProgress() {
      const p = loadProgress();
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        known: p.known,
        index,
        chapter: els.chapterFilter.value,
        topic: els.topicFilter.value,
        mode,
      }));
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getProgressStats() {
      const known = new Set(loadProgress().known);
      const chapters = [...new Set(WENDUNGEN_DATA.map(d => d.chapter))].sort((a, b) => a - b);

      return chapters.map(ch => {
        const items = WENDUNGEN_DATA.filter(d => d.chapter === ch);
        const topics = [...new Set(items.map(d => d.topic))].sort();

        const topicStats = topics.map(topic => {
          const topicItems = items.filter(d => d.topic === topic);
          const learned = topicItems.filter(d => known.has(d.id)).length;
          const total = topicItems.length;
          return { topic, learned, total, done: learned === total && total > 0, started: learned > 0 };
        });

        const learned = items.filter(d => known.has(d.id)).length;
        const total = items.length;
        const doneTopics = topicStats.filter(t => t.done).length;

        return { chapter: ch, learned, total, doneTopics, topicCount: topics.length, topics: topicStats };
      });
    }

    function renderProgressPanel() {
      const stats = getProgressStats();
      const totalLearned = stats.reduce((s, c) => s + c.learned, 0);
      const totalAll = WENDUNGEN_DATA.length;
      const completedChapters = stats.filter(c => c.learned === c.total && c.total > 0).length;
      const startedChapters = stats.filter(c => c.learned > 0).length;
      const completedTopics = stats.reduce((s, c) => s + c.doneTopics, 0);
      const startedTopics = stats.reduce((s, c) => s + c.topics.filter(t => t.started).length, 0);

      els.progressSummary.innerHTML = `
        <strong>${totalLearned} / ${totalAll}</strong> Wendung öğrenildi<br>
        <span style="color:var(--muted);font-size:.85rem">
          Kapitel: ${startedChapters} çalışıldı, ${completedChapters} tamamlandı ·
          Themen: ${startedTopics} çalışıldı, ${completedTopics} tamamlandı
        </span>
      `;

      els.progressList.innerHTML = stats.map(ch => {
        const chClass = ch.learned === ch.total ? 'badge' : ch.learned > 0 ? 'badge partial' : 'badge empty';
        const chLabel = ch.learned === ch.total ? 'Tamam' : ch.learned > 0 ? 'Devam' : 'Başlanmadı';

        const topicsHtml = ch.topics.map(t => {
          const cls = t.done ? 'done' : t.started ? 'partial' : 'none';
          const pct = t.total ? Math.round((t.learned / t.total) * 100) : 0;
          const status = t.done ? '✓' : t.started ? `${t.learned}/${t.total}` : '–';
          return `
            <div class="progress-topic clickable ${cls}" data-chapter="${ch.chapter}" data-topic="${escapeHtml(t.topic)}">
              <div style="flex:1;min-width:0">
                <div>${escapeHtml(t.topic)}</div>
                <div class="topic-mini-bar"><div style="width:${pct}%"></div></div>
              </div>
              <span>${status}</span>
            </div>
          `;
        }).join('');

        return `
          <div class="progress-chapter">
            <div class="progress-chapter-head">
              <span>Kapitel ${ch.chapter}</span>
              <span class="${chClass}">${chLabel} · ${ch.learned}/${ch.total}</span>
            </div>
            ${topicsHtml}
          </div>
        `;
      }).join('');

      els.learnedCount.textContent = `${totalLearned} öğrenildi`;
    }

    function updateFilterLabels() {
      const known = new Set(loadProgress().known);

      [...els.chapterFilter.options].forEach(opt => {
        if (opt.value === 'all') return;
        const ch = Number(opt.value);
        const items = WENDUNGEN_DATA.filter(d => d.chapter === ch);
        const learned = items.filter(d => known.has(d.id)).length;
        opt.textContent = `Kapitel ${ch} (${learned}/${items.length})`;
      });

      [...els.topicFilter.options].forEach(opt => {
        if (opt.value === 'all') return;
        const items = WENDUNGEN_DATA.filter(d => d.topic === opt.value);
        const learned = items.filter(d => known.has(d.id)).length;
        const mark = learned === items.length ? ' ✓' : learned > 0 ? ` · ${learned}/${items.length}` : '';
        opt.textContent = opt.value + mark;
      });
    }

    function populateFilters() {
      const chapters = [...new Set(WENDUNGEN_DATA.map(d => d.chapter))].sort((a,b)=>a-b);
      chapters.forEach(ch => {
        const opt = document.createElement('option');
        opt.value = ch;
        opt.textContent = `Kapitel ${ch}`;
        els.chapterFilter.appendChild(opt);
      });
      updateTopicFilter();
      updateFilterLabels();
    }

    function updateTopicFilter() {
      const ch = els.chapterFilter.value;
      const topics = [...new Set(
        WENDUNGEN_DATA
          .filter(d => ch === 'all' || String(d.chapter) === ch)
          .map(d => d.topic)
      )].sort();
      els.topicFilter.innerHTML = '<option value="all">Alle Themen</option>';
      topics.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        els.topicFilter.appendChild(opt);
      });
      updateFilterLabels();
    }

    function buildDeck() {
      const ch = els.chapterFilter.value;
      const topic = els.topicFilter.value;
      const progress = loadProgress();

      let items = WENDUNGEN_DATA.filter(d => {
        if (ch !== 'all' && String(d.chapter) !== ch) return false;
        if (topic !== 'all' && d.topic !== topic) return false;
        return true;
      });

      if (mode === 'review') {
        items = items.filter(d => progress.known.includes(d.id));
      } else if (mode === 'learn') {
        items.sort((a, b) => {
          const ak = progress.known.includes(a.id) ? 1 : 0;
          const bk = progress.known.includes(b.id) ? 1 : 0;
          return ak - bk;
        });
      }

      if (mode === 'random') items = shuffle(items);
      deck = items;
      if (index >= deck.length) index = 0;
      render();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render() {
      revealed = false;
      els.turkceText.classList.add('hidden');
      els.revealBtn.style.display = '';
      els.knownBtn.style.display = 'none';
      els.againBtn.style.display = 'none';
      els.hintText.textContent = 'Türkçesini tahmin et, sonra dokun.';

      if (!deck.length) {
        els.wendungText.textContent = mode === 'review'
          ? 'Bu filtrede henüz öğrenilmiş Wendung yok.'
          : 'Bu filtrede Wendung bulunamadı.';
        els.turkceText.textContent = '';
        els.chapterPill.textContent = '–';
        els.topicPill.textContent = '–';
        els.counter.textContent = '0 / 0';
        els.progressBar.style.width = '0%';
        els.revealBtn.disabled = true;
        return;
      }

      els.revealBtn.disabled = false;
      const item = deck[index];
      const isLearned = loadProgress().known.includes(item.id);

      els.wendungText.textContent = item.wendung;
      els.turkceText.textContent = item.turkce || '';
      els.turkceText.classList.add('hidden');
      els.chapterPill.textContent = `Kapitel ${item.chapter}`;
      els.topicPill.textContent = item.topic;

      let learnedBadge = document.getElementById('learnedBadge');
      if (isLearned) {
        if (!learnedBadge) {
          learnedBadge = document.createElement('span');
          learnedBadge.id = 'learnedBadge';
          learnedBadge.className = 'pill learned';
          els.card.querySelector('.meta').appendChild(learnedBadge);
        }
        learnedBadge.textContent = '✓ Öğrenildi';
        learnedBadge.style.display = '';
        els.hintText.textContent = 'Daha önce çalıştın — yine de tekrar et.';
      } else {
        if (learnedBadge) learnedBadge.style.display = 'none';
        els.hintText.textContent = 'Türkçesini tahmin et, sonra dokun.';
      }
      els.counter.textContent = `${index + 1} / ${deck.length}`;
      els.progressBar.style.width = `${((index + 1) / deck.length) * 100}%`;

      const progress = loadProgress();
      els.learnedCount.textContent = `${progress.known.length} öğrenildi`;
      updateFilterLabels();

    }

    function reveal() {
      if (!deck.length || revealed) return;
      revealed = true;
      els.turkceText.classList.remove('hidden');
      els.revealBtn.style.display = 'none';
      els.knownBtn.style.display = '';
      els.againBtn.style.display = '';
      const isLearned = loadProgress().known.includes(deck[index].id);
      els.knownBtn.textContent = isLearned ? 'Hâlâ biliyorum ✓' : 'Biliyorum ✓';
      els.againBtn.textContent = isLearned ? 'Unutmuşum, tekrar et' : 'Tekrar et';
      els.hintText.textContent = 'Doğru tahmin ettin mi?';
    }

    function markKnown(known) {
      if (!deck.length) return;
      const item = deck[index];
      const progress = loadProgress();
      if (known && !progress.known.includes(item.id)) {
        progress.known.push(item.id);
      } else if (!known) {
        progress.known = progress.known.filter(id => id !== item.id);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...progress, index, mode }));
      updateFilterLabels();
      if (mode === 'progress') renderProgressPanel();
      next();
    }

    function studyTopic(chapter, topic) {
      els.chapterFilter.value = String(chapter);
      updateTopicFilter();
      els.topicFilter.value = topic;
      index = 0;
      setMode('learn');
    }

    function next() {
      if (!deck.length) return render();
      index = (index + 1) % deck.length;
      saveProgress();
      render();
    }

    function prev() {
      if (!deck.length) return;
      index = (index - 1 + deck.length) % deck.length;
      saveProgress();
      render();
    }

    function setMode(m) {
      mode = m;
      [els.modeLearn, els.modeRandom, els.modeReview, els.modeProgress].forEach(btn => btn.classList.remove('active'));
      const btnMap = {
        learn: els.modeLearn,
        random: els.modeRandom,
        review: els.modeReview,
        progress: els.modeProgress,
      };
      btnMap[m].classList.add('active');

      if (m === 'progress') {
        els.learnView.classList.add('hidden');
        els.progressView.classList.remove('hidden');
        renderProgressPanel();
        return;
      }

      els.learnView.classList.remove('hidden');
      els.progressView.classList.add('hidden');
      index = 0;
      buildDeck();
    }

    // Events
    els.revealBtn.addEventListener('click', reveal);
    els.knownBtn.addEventListener('click', () => markKnown(true));
    els.againBtn.addEventListener('click', () => markKnown(false));
    els.nextBtn.addEventListener('click', next);
    els.prevBtn.addEventListener('click', prev);
    els.shuffleBtn.addEventListener('click', () => { deck = shuffle(deck); index = 0; render(); });
    els.chapterFilter.addEventListener('change', () => { updateTopicFilter(); index = 0; buildDeck(); });
    els.topicFilter.addEventListener('change', () => { index = 0; buildDeck(); });
    els.modeLearn.addEventListener('click', () => setMode('learn'));
    els.modeRandom.addEventListener('click', () => setMode('random'));
    els.modeReview.addEventListener('click', () => setMode('review'));
    els.modeProgress.addEventListener('click', () => setMode('progress'));

    els.progressList.addEventListener('click', (e) => {
      const row = e.target.closest('.progress-topic.clickable');
      if (!row) return;
      studyTopic(Number(row.dataset.chapter), row.dataset.topic);
    });

    // Swipe
    let touchStartX = 0;
    els.card.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
    els.card.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(dx) < 60) return;
      if (dx < 0) next(); else prev();
    }, { passive: true });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') next();
      if (e.key === 'ArrowLeft') prev();
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); reveal(); }
    });

    populateFilters();
    buildDeck();
  </script>
</body>
</html>
